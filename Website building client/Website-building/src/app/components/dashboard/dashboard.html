<!-- dashboard.html — מיקום: src/app/components/dashboard/dashboard.html -->

<div *ngIf="isLoading" class="db-loading">
  <div class="db-spinner"></div>
</div>

<div *ngIf="!isLoading" class="db-wrap">

  <!-- כותרת -->
  <div class="db-header">
    <div class="db-header-left">
      <h1 class="db-title">האתרים שלי</h1>
      <span class="db-count" *ngIf="sites.length > 0">{{ sites.length }} אתרים</span>
    </div>
    <button class="db-btn-new" (click)="goToCreate()">
      <svg width="14" height="14" viewBox="0 0 14 14" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round">
        <line x1="7" y1="1" x2="7" y2="13"/><line x1="1" y1="7" x2="13" y2="7"/>
      </svg>
      אתר חדש
    </button>
  </div>

  <!-- מצב ריק -->
  <div *ngIf="sites.length === 0" class="db-empty">
    <div class="db-empty-icon">
      <svg width="40" height="40" viewBox="0 0 40 40" fill="none" stroke="#f97316" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round">
        <rect x="4" y="6" width="32" height="28" rx="3"/>
        <line x1="4" y1="14" x2="36" y2="14"/>
        <circle cx="9" cy="10" r="1.5" fill="#f97316" stroke="none"/>
        <circle cx="14" cy="10" r="1.5" fill="#f97316" stroke="none"/>
        <line x1="20" y1="24" x2="20" y2="30"/><line x1="17" y1="27" x2="23" y2="27"/>
      </svg>
    </div>
    <h3 class="db-empty-title">עוד אין אתרים</h3>
    <p class="db-empty-sub">צרי את האתר הראשון שלך — זה לוקח דקות</p>
    <button class="db-btn-new" (click)="goToCreate()">
      <svg width="14" height="14" viewBox="0 0 14 14" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round">
        <line x1="7" y1="1" x2="7" y2="13"/><line x1="1" y1="7" x2="13" y2="7"/>
      </svg>
      בניית אתר ראשון
    </button>
  </div>

  <!-- גריד -->
  <div *ngIf="sites.length > 0" class="db-grid">

    <!-- כרטיסי אתרים -->
    <div *ngFor="let site of sites; let i = index" class="db-card">

      <!-- פס עליון עם gradient כתום/אפור -->
      <div class="db-card-top" [class]="'db-card-top-' + (i % 4)">
        <span class="db-card-initial">{{ site.siteName?.charAt(0)?.toUpperCase() }}</span>
        <span class="db-card-badge">פעיל</span>
      </div>

      <!-- תוכן -->
      <div class="db-card-body">
        <h3 class="db-card-name">{{ site.siteName }}</h3>
        <p class="db-card-sub">
          <svg width="10" height="10" viewBox="0 0 10 10" fill="none" stroke="currentColor" stroke-width="1.3" stroke-linecap="round">
            <circle cx="5" cy="5" r="4"/><path d="M5 2.5v2.5l1.5 1.5"/>
          </svg>
          {{ site.subdomain }}
        </p>
      </div>

      <!-- פעולות -->
      <div class="db-card-actions">
        <button class="db-act-edit" (click)="openEditor(site)">
          <svg width="12" height="12" viewBox="0 0 12 12" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round">
            <path d="M8.5 1.5l2 2L4 10H2V8l6.5-6.5z"/>
          </svg>
          עריכה
        </button>
        <button class="db-act-icon db-act-book" (click)="goToBookings(site.id)" title="הזמנות">
          <svg width="13" height="13" viewBox="0 0 13 13" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round">
            <rect x="1" y="2" width="11" height="10" rx="1.5"/>
            <line x1="1" y1="5.5" x2="12" y2="5.5"/>
            <line x1="4" y1="1" x2="4" y2="3.5"/>
            <line x1="9" y1="1" x2="9" y2="3.5"/>
          </svg>
        </button>
        <button class="db-act-icon db-act-del" (click)="deleteSite(site.id)" title="מחק">
          <svg width="13" height="13" viewBox="0 0 13 13" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
            <polyline points="2,3.5 11,3.5"/>
            <path d="M4.5 3.5V2.5h4v1"/>
            <path d="M3 3.5l.6 7h5.8l.6-7"/>
          </svg>
        </button>
      </div>

    </div>

    <!-- כרטיס הוספה -->
    <div class="db-card-add" (click)="goToCreate()">
      <div class="db-card-add-icon">
        <svg width="22" height="22" viewBox="0 0 22 22" fill="none" stroke="#f97316" stroke-width="1.8" stroke-linecap="round">
          <line x1="11" y1="3" x2="11" y2="19"/><line x1="3" y1="11" x2="19" y2="11"/>
        </svg>
      </div>
      <span>אתר חדש</span>
    </div>

  </div>
</div>
